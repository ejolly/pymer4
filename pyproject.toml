[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pymer4"
dynamic = ["version"]
authors = [
    {name = "Eshin Jolly", email = "eshin.jolly.GR@dartmouth.edu"},
]
description = "pymer4: all the convenience of lme4 in python"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
]
keywords = ["statistics", "multi-level-modeling", "regression", "analysis"]

# Python dependencies
dependencies = [
    "pandas>=2.2.0",
    "numpy>=2.0",
    "rpy2>=3.5.11",
    "seaborn>=0.13.0",
    "patsy>=1.0.1",
    "joblib>=1.4.2",
    "scipy>=1.13.0",
    "scikit-learn>=1.4",
]

# Development dependencies
[project.optional-dependencies]
dev = [
    "ruff==0.11.0",
    "pytest",
    "jupyter-book",
]

# R dependencies
[tool.rconfig]
dependencies = [
    "r-lmerTest",
    "r-emmeans",
    "r-broom",
    "r-broom.mixed"
]

[project.urls]
Homepage = "http://eshinjolly.com/pymer4/"

[tool.setuptools]
packages = ["pymer4"]
package-data = {"pymer4" = ["resources/*"]}

[tool.setuptools.exclude-package-data]
pymer4 = ["tests/*"]

[tool.setuptools.dynamic]
version = {attr = "pymer4.version.__version__"} 