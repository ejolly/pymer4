name: Pixi Run Tests
on:
  push:
    branches:
      - refactor
  workflow_dispatch:
    inputs:
      upload_anaconda:
        description: 'Upload build to anaconda?'
        required: false
        default: 'skip'
        type: choice
        options:
          - 'skip'
          - 'pre-release'
          - 'main'

jobs:
  pixi-test-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi & Build Docs
        uses: prefix-dev/setup-pixi@v0.8.3
        env:
          token: ${{ secrets.ANACONDA_TOKEN }}
        with:
          pixi-version: v0.42.1
      - run: | 
          pixi run build
          file=$(pixi run build-output) pixi run upload-pre
