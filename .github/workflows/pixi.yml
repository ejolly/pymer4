name: Pixi Run Tests
on:
  push:
    branches:
      - refactor
  workflow_dispatch:
    inputs:
      upload_anaconda:
        description: 'Upload build to anaconda?'
        required: false
        default: 'skip'
        type: choice
        options:
          - 'skip'
          - 'pre-release'
          - 'main'

jobs:
  pixi-test-and-docs:

    runs-on: ubuntu-latest
    env:
      ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.42.1

      - name: Pixi Run Tests & Build Docs
        run: | 
         pixi run docs-build
         touch docs/_build/html/.nojekyll

      - name: Pixi Build Conda Package
        run: |
          pixi run build

      - name: Pixi Upload Conda Package
        shell: pixi run bash -e {0}
        run: |
          upload_file=$(pixi run build-output)
          anaconda -t $ANACONDA_TOKEN upload $upload_file -l "pre-release"


